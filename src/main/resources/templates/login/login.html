<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Menaje Selecto - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:url('/img/al-elmes-ULHxWq8reao-unsplash.jpg') no-repeat center center;
    background-size:cover;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding-right:100px;
    font-family:Arial, sans-serif;
}

.login-card{
    width:380px;
    background:rgba(255,255,255,0.92);
    padding:35px;
    border-radius:15px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#1F3A5F;
    font-size:30px;
    font-weight:bold;
}

.logo p{
    color:#666;
    font-size:14px;
}

.form-label{
    font-weight:bold;
}

.btn-login{
    width:100%;
    background:#1F3A5F;
    color:white;
    font-weight:bold;
    border:none;
    padding:10px;
}

.btn-login:hover{
    background:#294c79;
}

.credenciales{
    margin-top:20px;
    font-size:12px;
    color:#555;
    text-align:center;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <h1>Tu Menaje Selecto</h1>
        <p>Sistema de Gestión de Eventos</p>
    </div>

    <form onsubmit="return validarLogin()">

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email"
                   class="form-control"
                   id="usuario"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password"
                   class="form-control"
                   id="clave"
                   required>
        </div>

        <button type="submit" class="btn btn-login">
            Ingresar
        </button>

    </form>

    <div class="credenciales">
        Tu Menaje Selecto © 2026
    </div>

</div>

<script>

function validarLogin(){

    let usuario = document.getElementById("usuario").value;
    let clave = document.getElementById("clave").value;

    // Administrador
    if(usuario === "administracion@tumenajeselecto.com"
       && clave === "151119"){

        window.location.href="/inicioAdmin";
        return false;
    }

    // Empleado
    if(usuario === "operaciones@tumenajeselecto.com"
       && clave === "142411"){

        window.location.href="/inicioEmpleado";
        return false;
    }

    alert("Usuario o contraseña incorrectos");
    return false;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
